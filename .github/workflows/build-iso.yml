name: Build ArcOS ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install electron-builder deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y rpm fakeroot dpkg libarchive-tools

      - name: Build Electron AppImage
        run: npx electron-builder --linux AppImage --x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Copy AppImage into chroot
        run: |
          mkdir -p scripts/iso/live-build-config/config/includes.chroot/opt/arcos
          APPIMAGE=$(ls dist/ArcOS*.AppImage | head -1)
          echo "Found: $APPIMAGE"
          cp "$APPIMAGE" scripts/iso/live-build-config/config/includes.chroot/opt/arcos/arcos-shell.AppImage
          chmod +x scripts/iso/live-build-config/config/includes.chroot/opt/arcos/arcos-shell.AppImage
          echo "AppImage staged successfully"

      - name: Install live-build
        run: |
          sudo apt-get install -y \
            live-build debootstrap squashfs-tools xorriso \
            syslinux-utils isolinux grub-efi-amd64-bin grub-pc-bin mtools

      - name: Stage config files
        run: |
          ROOT=$(pwd)
          CHROOT="$ROOT/scripts/iso/live-build-config/config/includes.chroot"

          mkdir -p "$CHROOT/etc/greetd"
          cp linux/greetd/config.toml "$CHROOT/etc/greetd/config.toml"

          mkdir -p "$CHROOT/etc/arcos"
          cp linux/wayfire/wayfire.ini "$CHROOT/etc/arcos/wayfire.ini"

          mkdir -p "$CHROOT/etc/systemd/user"
          cp linux/systemd/arcos-shell.service "$CHROOT/etc/systemd/user/"
          cp linux/systemd/arcos-session.target "$CHROOT/etc/systemd/user/"

          mkdir -p "$CHROOT/usr/share/wayland-sessions"
          printf '[Desktop Entry]\nName=ArcOS\nComment=ArcOS Shell\nExec=/usr/local/bin/arcos-session\nType=Application\n' \
            > "$CHROOT/usr/share/wayland-sessions/arcos.desktop"

          mkdir -p "$CHROOT/usr/local/bin"
          cp scripts/setup/arcos-session.sh "$CHROOT/usr/local/bin/arcos-session"
          chmod +x "$CHROOT/usr/local/bin/arcos-session"

          mkdir -p "$CHROOT/usr/share/applications"
          cp linux/desktop-entries/*.desktop "$CHROOT/usr/share/applications/"

      - name: Configure live-build
        working-directory: scripts/iso/live-build-config
        run: sudo lb config

      - name: Build ISO
        working-directory: scripts/iso/live-build-config
        run: sudo lb build 2>&1 | tail -100

      - name: Find and rename ISO
        run: |
          ISO=$(find scripts/iso/live-build-config -name "*.iso" | head -1)
          echo "ISO found: $ISO"
          cp "$ISO" arcos-0.7.0-amd64.iso

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: arcos-iso
          path: arcos-0.7.0-amd64.iso
          retention-days: 30
