name: Build ArcOS ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # lets you trigger manually from GitHub website

jobs:
  build-iso:
    runs-on: ubuntu-22.04   # free Ubuntu runner — has live-build available
    timeout-minutes: 90

    steps:
      # ── 1. Checkout ───────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js + Electron AppImage ────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Build Electron AppImage
        run: |
          # electron-builder needs these on Ubuntu
          sudo apt-get install -y \
            libopenjp2-tools \
            rpm \
            fakeroot \
            dpkg \
            libarchive-tools
          npm run build:linux
        env:
          # Skip code signing for CI builds
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy AppImage into live-build chroot
        run: |
          APPIMAGE=$(ls dist/ArcOS*.AppImage | head -1)
          echo "Found AppImage: $APPIMAGE"
          cp "$APPIMAGE" \
            scripts/iso/live-build-config/config/includes.chroot/opt/arcos/arcos-shell.AppImage
          chmod +x \
            scripts/iso/live-build-config/config/includes.chroot/opt/arcos/arcos-shell.AppImage

      # ── 3. Install live-build ─────────────────────────
      - name: Install live-build and dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso \
            syslinux-utils \
            isolinux \
            grub-efi-amd64-bin \
            grub-pc-bin \
            mtools

      # ── 4. Copy Linux config files into chroot ────────
      - name: Stage Linux config files
        run: |
          # greetd config
          mkdir -p scripts/iso/live-build-config/config/includes.chroot/etc/greetd
          cp linux/greetd/config.toml \
            scripts/iso/live-build-config/config/includes.chroot/etc/greetd/config.toml

          # wayfire config
          mkdir -p scripts/iso/live-build-config/config/includes.chroot/etc/arcos
          cp linux/wayfire/wayfire.ini \
            scripts/iso/live-build-config/config/includes.chroot/etc/arcos/wayfire.ini

          # systemd services
          mkdir -p scripts/iso/live-build-config/config/includes.chroot/etc/systemd/user
          cp linux/systemd/arcos-shell.service \
            scripts/iso/live-build-config/config/includes.chroot/etc/systemd/user/
          cp linux/systemd/arcos-session.target \
            scripts/iso/live-build-config/config/includes.chroot/etc/systemd/user/

          # Wayland session entry
          mkdir -p scripts/iso/live-build-config/config/includes.chroot/usr/share/wayland-sessions
          cat > scripts/iso/live-build-config/config/includes.chroot/usr/share/wayland-sessions/arcos.desktop << 'SESSION'
          [Desktop Entry]
          Name=ArcOS
          Comment=ArcOS Desktop Shell
          Exec=/usr/local/bin/arcos-session
          Type=Application
          SESSION

          # arcos-session script
          mkdir -p scripts/iso/live-build-config/config/includes.chroot/usr/local/bin
          cp scripts/setup/arcos-session.sh \
            scripts/iso/live-build-config/config/includes.chroot/usr/local/bin/arcos-session
          chmod +x \
            scripts/iso/live-build-config/config/includes.chroot/usr/local/bin/arcos-session

          # desktop entries
          mkdir -p scripts/iso/live-build-config/config/includes.chroot/usr/share/applications
          cp linux/desktop-entries/*.desktop \
            scripts/iso/live-build-config/config/includes.chroot/usr/share/applications/

      # ── 5. Run live-build ─────────────────────────────
      - name: Configure live-build
        working-directory: scripts/iso/live-build-config
        run: sudo lb config

      - name: Build live ISO
        working-directory: scripts/iso/live-build-config
        run: sudo lb build 2>&1 | tee ../../../build/build.log

      # ── 6. Rename and check ISO ───────────────────────
      - name: Rename ISO
        run: |
          ISO=$(ls scripts/iso/live-build-config/live-image-amd64.hybrid.iso 2>/dev/null || \
                ls scripts/iso/live-build-config/*.iso 2>/dev/null | head -1)
          echo "ISO found: $ISO"
          cp "$ISO" build/arcos-0.7.0-amd64.iso
          ls -lh build/arcos-0.7.0-amd64.iso

      # ── 7. Upload as GitHub Release artifact ──────────
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: arcos-iso
          path: build/arcos-0.7.0-amd64.iso
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build/build.log
          retention-days: 7

      # ── 8. Create GitHub Release (on main push) ───────
      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v0.7.0-dev
          name: ArcOS v0.7.0-dev
          draft: true
          files: build/arcos-0.7.0-amd64.iso
          body: |
            ## ArcOS Desktop Shell v0.7.0-dev

            Bootable live ISO built automatically by GitHub Actions.

            ### How to run
            **VirtualBox:** New VM → Linux → Debian 64-bit → attach ISO → boot
            **USB:** `dd if=arcos-0.7.0-amd64.iso of=/dev/sdX bs=4M status=progress`
            **Ventoy:** Copy ISO to Ventoy USB → select from boot menu

            ### Login
            Username: `user`  Password: `arcos`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
