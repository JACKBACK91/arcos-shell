# /etc/arcos/wayfire.ini
# Wayfire compositor configuration for ArcOS
# Installed to: /etc/arcos/wayfire.ini
# User override: ~/.config/wayfire.ini

[core]
# Plugins to load — keep minimal for shell use
plugins = \
    autostart \
    command \
    decoration \
    expo \
    fast-switcher \
    grid \
    idle \
    move \
    place \
    resize \
    shortcuts-inhibit \
    simple-tile \
    switcher \
    vswitch \
    window-rules \
    wm-actions \
    zoom

# Number of virtual workspaces
vwidth  = 1
vheight = 1

# Focus mode: click-to-focus (not sloppy focus)
focus_button_with_modifiers = false
focus_clicks_through_fullscreen = false

# No server-side decorations — ArcOS draws its own
preferred_decoration_mode = client

[output]
# Auto-detect display settings
# Override with: mode = 1920x1080@60
mode = auto
scale = 1.0

[autostart]
# Start ArcOS shell (already started by arcos-session, but listed for reference)
# arcos = /usr/local/bin/arcos-shell

# Status bar / panel — not needed (ArcOS renders its own taskbar in the shell)
# panel = false

# Wallpaper — ArcOS sets its own via CSS
# swaybg = swaybg -m fill -i /usr/share/arcos/wallpapers/default.jpg

# PipeWire (started by arcos-session, listed here for fallback)
pipewire = pipewire

[decoration]
# Window decoration settings
# ArcOS uses client-side decorations (built into Electron window)
title_height = 0
border_size  = 0
button_order = minimize maximize close

[move]
activate = <super> BTN_LEFT

[resize]
activate = <super> BTN_RIGHT

[zoom]
modifier = <super>

[fast-switcher]
activate = <super> KEY_TAB

[grid]
# Snap windows to grid positions with Super+Arrow
slot_b  = <super> KEY_DOWN
slot_bl = <super> KEY_KP1
slot_br = <super> KEY_KP3
slot_c  = <super> KEY_UP
slot_l  = <super> KEY_LEFT
slot_r  = <super> KEY_RIGHT
slot_tl = <super> KEY_KP7
slot_tr = <super> KEY_KP9

[command]
# Key bindings — these run native apps outside ArcOS shell
# ArcOS shell handles its own keyboard shortcuts internally

# Emergency terminal (if shell crashes)
binding_terminal = <ctrl> <alt> KEY_T
command_terminal  = foot

# Screenshot
binding_screenshot = KEY_PRINT
command_screenshot  = grim /tmp/screenshot-$(date +%Y%m%d-%H%M%S).png

# Lock screen
binding_lock = <super> KEY_L
command_lock  = /usr/local/bin/arcos-lock

[idle]
# Screen lock timeout (seconds)
# 0 = disabled
dpms_timeout = 600
toggle       = <super> KEY_I

[window-rules]
# Force ArcOS shell to be maximized and on layer background
# (Electron handles its own positioning, but this ensures it stays on top of wayfire)
rule_arcos = on created if app_id is "arcos-shell" then maximize
